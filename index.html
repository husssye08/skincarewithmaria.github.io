<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skincare with Maria</title>
    <style>
        /* Reset and layout */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #ffffff;
        }
        
        /* The Header Bar (Covers the Wix Ad) */
        .custom-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Adjust height if the Wix ad is taller */
            background-color: #ffffff; 
            z-index: 9999; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #eeeeee; /* Subtle professional line */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .brand-name {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #333333;
            font-weight: 400;
        }

        /* The Wix Window */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            padding-top: 60px; /* This pushes your ACTUAL Wix content down so it's not hidden */
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="custom-header">
        <div class="brand-name">Skincare with Maria</div>
    </div>

    <iframe src="https://husssye08.wixsite.com/skincare-with-maria"></iframe>

</body>
</html>

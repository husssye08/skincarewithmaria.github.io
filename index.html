<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skincare with Maria</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #your-site-color; }

        .custom-header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            /* CHANGE THIS NUMBER TO MAKE THE BAR TALLER */
            height: 120px; 
            background-color: #fceeee; 
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        .brand-name {
            font-family: Arial, sans-serif;
            /* CHANGE THIS NUMBER TO MAKE THE TEXT BIGGER */
            font-size: 40px; 
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #000;
        }

        iframe {
            position: absolute;
            /* THIS NUMBER MUST MATCH THE HEIGHT ABOVE */
            top: 180px; 
            left: 0; width: 100%;
            height: calc(100% - 180px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="custom-header">
        <div class="brand-name">Skincare with Maria</div>
    </div>
    <iframe src="https://husssye08.wixsite.com/skincare-with-maria"></iframe>
</body>
</html>

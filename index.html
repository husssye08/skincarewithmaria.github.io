<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skincare with Maria</title>
    <style>
        /* Base Settings */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background: #ffffff; 
        }

        /* The Centered Banner */
        .custom-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px; 
            background-color: #ffffff; 
            z-index: 999999 !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .brand-name {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 22px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #000;
            text-align: center;
        }

        /* The Wix Site Window */
        iframe {
            position: absolute;
            top: 90px; 
            left: 0;
            width: 100%;
            height: calc(100% - 90px); 
            border: none;
            display: block;
        }

        /* Mobile Adjustments to remove borders and shrink header */
        @media only screen and (max-width: 600px) {
            .custom-header { height: 65px; }
            .brand-name { font-size: 16px; letter-spacing: 2px; }
            iframe { 
                top: 65px; 
                height: calc(100% - 65px);
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="custom-header">
        <div class="brand-name">Skincare with Maria</div>
    </div>

    <iframe src="https://husssye08.wixsite.com/skincare-with-maria"></iframe>

</body>
</html>

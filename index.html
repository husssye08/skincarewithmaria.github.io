<style>
    /* 1. THE DEFAULT (LAPTOP/DESKTOP) SETTINGS */
    body, html { 
        margin: 0; padding: 0; height: 100vh; width: 100vw; 
        overflow: hidden; background: #YOUR_SITE_COLOR; /* Use your color here */
    }

    .custom-header {
        position: fixed;
        top: 0; left: 0; width: 100%;
        height: 120px; /* Taller for Laptop */
        background-color: #YOUR_SITE_COLOR; 
        z-index: 99999;
        display: flex; align-items: center; justify-content: center;
    }

    .brand-name {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 28px; /* Larger for Laptop */
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #000;
    }

    iframe {
        position: absolute;
        top: 120px; /* Must match the 120px above */
        left: 0; width: 100%;
        height: calc(100% - 120px);
        border: none;
    }

    /* 2. THE MOBILE OVERRIDE (For screens smaller than 768px) */
    @media only screen and (max-width: 768px) {
        .custom-header {
            height: 70px; /* Your perfect mobile height */
        }
        .brand-name {
            font-size: 18px; /* Smaller for phone */
            letter-spacing: 3px;
        }
        iframe {
            top: 70px; /* Must match the 70px mobile height */
            height: calc(100% - 70px);
        }
    }
</style>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skincare with Maria</title>
    <style>
        /* 1. Reset everything to edge-to-edge */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #fceeee; }

        /* 2. THE OVERLAP BANNER */
        .custom-header {
            position: fixed; /* Fixes it to the top */
            top: 0; 
            left: 0; 
            width: 100%;
            height: 120px; /* Adjust this to cover the Wix ad perfectly */
            background-color: #fceeee; /* Match your Wix background color */
            z-index: 999999 !important; /* Forces it to stay ON TOP of everything */
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand-name {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 32px; 
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #000;
        }

        /* 3. THE WIX SITE (Takes up 100% of the screen behind the banner) */
        iframe {
            position: absolute;
            top: 0; /* Starts at the very top, underneath the banner */
            left: 0; 
            width: 100%;
            height: 100%; 
            border: none;
            z-index: 1; /* Sits behind the banner */
        }

        /* 4. MOBILE ADJUSTMENTS */
        @media only screen and (max-width: 768px) {
            .custom-header { height: 80px; } 
            .brand-name { font-size: 18px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div class="custom-header">
        <div class="brand-name">Skincare with Maria</div>
    </div>

    <iframe src="https://husssye08.wixsite.com/skincare-with-maria"></iframe>

</body>
</html>

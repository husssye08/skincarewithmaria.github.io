<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skincare with Maria</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #ffffff; }

        .custom-header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 80px;
            background-color: #ffffff; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .brand-name {
            font-family: sans-serif; font-size: 20px;
            letter-spacing: 3px; text-transform: uppercase; color: #000;
        }

        /* This is the magic part for the "Shrunken" problem */
        .frame-container {
            position: absolute;
            top: 80px; 
            left: 0;
            width: 100%;
            height: calc(100% - 80px);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* MOBILE FIX: If the site looks too small, we force it to 100% width */
        @media only screen and (max-width: 600px) {
            .custom-header { height: 60px; }
            .frame-container { top: 60px; height: calc(100% - 60px); }
            iframe {
                width: 100vw;
                height: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="custom-header">
        <div class="brand-name">Skincare with Maria</div>
    </div>

    <div class="frame-container">
        <iframe src="https://husssye08.wixsite.com/skincare-with-maria"></iframe>
    </div>

</body>
</html>
